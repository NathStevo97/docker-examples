services:
  heimdall:
    image: lscr.io/linuxserver/heimdall:2.7.6@sha256:37b8af11d12ea6b2cc7917d4d71ef8084943566308efad03d8e34d5d9fc75771
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - /opt/stacks/heimdall:/config
    ports:
      - "${HEIMDALL_BIND_IP:-127.0.0.1}:80:80"
    restart: unless-stopped
