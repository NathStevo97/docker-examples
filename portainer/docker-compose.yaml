services:
  portainer:
    image: portainer/portainer-ce:2.43.0@sha256:707366c811956fe077135a6633af67e698529612869711cdb24896c892b28feb
    container_name: portainer
    environment:
      - TZ=Europe/Londin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "8000:8000"
      - "9443:9443"
    restart: always

volumes:
  portainer_data:
    external: true
