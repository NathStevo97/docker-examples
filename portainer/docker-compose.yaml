services:
  portainer:
    image: portainer/portainer-ce:2.39.3@sha256:d27f76194b719bfe2a34779d51798a7adf02510cfba69ebcb538267f75aa4f47
    container_name: portainer
    environment:
      - TZ=Europe/Londin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "8000:8000"
      - "9443:9443"
    restart: always

volumes:
  portainer_data:
    external: true
